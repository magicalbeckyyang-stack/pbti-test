<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBTI · 拼多多消费者人格测试</title>
<style>
  :root{
    --bg:#fdf6e3; --ink:#1a1a1a; --pop:#ff4d4d; --pop2:#ffd23f;
    --blue:#3a86ff; --green:#06d6a0; --purple:#9b5de5; --orange:#fb8500; --card:#fffdf7;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;
    background-image:radial-gradient(var(--pop2) 1.5px,transparent 1.5px);background-size:26px 26px}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 150px}

  .hero{text-align:center;padding:40px 16px 10px}
  .badge{display:inline-block;background:var(--ink);color:var(--pop2);font-weight:800;font-size:13px;
    letter-spacing:3px;padding:6px 14px;border-radius:30px;transform:rotate(-3deg);margin-bottom:18px}
  .hero h1{font-size:clamp(34px,8vw,58px);font-weight:900;line-height:1.05;letter-spacing:-1px}
  .hero h1 .hl{background:var(--pop);color:#fff;padding:0 10px;border-radius:10px;display:inline-block;transform:rotate(-2deg)}
  .hero p{margin-top:16px;font-size:16px;font-weight:600;color:#555}
  .hero .meta{margin-top:10px;font-size:13px;color:#999;font-weight:600}

  .q{background:var(--card);border:3px solid var(--ink);border-radius:18px;padding:24px 20px;margin:24px 0;
    box-shadow:6px 6px 0 var(--ink);position:relative}
  .q:nth-child(even){transform:rotate(-.4deg)}.q:nth-child(odd){transform:rotate(.3deg)}
  .q.miss{border-color:var(--pop);box-shadow:6px 6px 0 var(--pop);animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .q .num{position:absolute;top:-16px;left:-12px;background:var(--ink);color:#fff;width:38px;height:38px;
    border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;
    transform:rotate(-8deg);border:3px solid var(--card)}
  .q .tag{position:absolute;top:-12px;right:14px;font-size:11px;font-weight:800;padding:3px 10px;
    border-radius:20px;color:#fff;letter-spacing:1px}
  .tag.after{background:var(--purple)}.tag.order{background:var(--orange)}.tag.brain{background:var(--green)}
  .qtitle{font-size:18px;font-weight:900;margin:2px 0 12px;padding-right:74px;letter-spacing:.3px}
  .sp{font-size:14.5px;color:#444;font-weight:600;margin:7px 0;line-height:1.75}
  .quote{background:#fff3bf;border-left:4px solid var(--ink);border-radius:8px;padding:9px 13px;
    font-weight:800;font-size:15px;margin:9px 0;line-height:1.6}
  .ask{font-size:16px;font-weight:900;margin:16px 0 12px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{border:2.5px solid var(--ink);border-radius:12px;padding:12px 14px;font-size:15px;font-weight:600;
    cursor:pointer;background:#fff;transition:transform .12s,background .12s;display:flex;gap:10px;align-items:flex-start}
  .opt:hover{transform:translateX(4px);background:var(--pop2)}
  .opt .k{font-weight:900;color:var(--pop)}
  .opt.sel{background:var(--ink);color:#fff;border-color:var(--ink)}.opt.sel .k{color:var(--pop2)}

  .bar{position:fixed;left:0;right:0;bottom:0;background:var(--ink);padding:14px 18px;display:flex;
    align-items:center;gap:16px;z-index:50;box-shadow:0 -4px 0 var(--pop)}
  .bar .prog{flex:1}.bar .ptxt{color:#fff;font-weight:800;font-size:14px;margin-bottom:6px}
  .bar .ptxt b{color:var(--pop2)}
  .track{height:10px;background:#444;border-radius:6px;overflow:hidden}
  .fill{height:100%;width:0;background:var(--pop);transition:width .3s}
  .go{background:#444;color:#888;border:none;font-weight:900;font-size:16px;padding:14px 26px;border-radius:30px;
    cursor:not-allowed;white-space:nowrap;letter-spacing:1px}
  .go.ready{background:var(--pop2);color:var(--ink);cursor:pointer;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

  #result{display:none}
  .rcard{background:var(--card);border:3px solid var(--ink);border-radius:22px;box-shadow:8px 8px 0 var(--ink);
    overflow:hidden;margin-top:10px}
  .rtop{padding:34px 24px;text-align:center;color:#fff}
  .rtop .code{font-size:clamp(48px,16vw,96px);font-weight:900;letter-spacing:3px;line-height:1}
  .rtop .cn{font-size:25px;font-weight:900;margin-top:8px}
  .rtop .rare{display:inline-block;margin-top:14px;background:rgba(0,0,0,.25);padding:5px 14px;border-radius:20px;
    font-size:13px;font-weight:800}
  .combo{display:flex;border-bottom:3px solid var(--ink)}
  .combo div{flex:1;padding:16px;font-weight:700;font-size:14px}
  .combo .c1{background:#fff3bf;border-right:3px solid var(--ink)}.combo .c2{background:#ffe3e3}
  .combo .lab{font-size:11px;font-weight:900;letter-spacing:1px;opacity:.6;display:block;margin-bottom:4px}
  .rbody{padding:24px}
  .rdesc{font-size:16px;font-weight:600;line-height:1.8;margin-bottom:24px}
  .dim{margin:14px 0}
  .dim .dl{display:flex;justify-content:space-between;font-size:12px;font-weight:800;margin-bottom:6px}
  .dbar{height:14px;background:#eee;border:2px solid var(--ink);border-radius:8px;position:relative;overflow:hidden}
  .dmark{position:absolute;top:0;bottom:0;left:0;border-radius:6px}
  .ract{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
  .ract button{flex:1;min-width:140px;border:3px solid var(--ink);border-radius:14px;padding:15px;font-weight:900;
    font-size:15px;cursor:pointer;box-shadow:4px 4px 0 var(--ink);transition:transform .1s}
  .ract button:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--ink)}
  .b-card{background:var(--blue);color:#fff}.b-retry{background:#fff}
  .shareline{margin-top:18px;padding:14px;background:var(--pop2);border:2.5px dashed var(--ink);border-radius:12px;
    font-weight:700;font-size:14px;text-align:center;line-height:1.6}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:12px 22px;border-radius:30px;font-weight:800;z-index:99;opacity:0;transition:opacity .3s;
    pointer-events:none;max-width:90%;text-align:center}
  .toast.show{opacity:1}
  #cardCanvas{display:none}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="wrap">

  <div id="test">
    <div class="hero">
      <div class="badge">P B T I 测试</div>
      <h1>你是哪种<br><span class="hl">拼多多物种</span>?</h1>
      <p>20 个荒诞现场 · 测出你的「下单人格 × 售后人格」</p>
      <div class="meta">⚠️ 必须全部答完才放行 — 世界已经够乱了,起码把题做完整</div>
    </div>
    <div id="questions"></div>
  </div>

  <div id="result">
    <div class="hero" style="padding-bottom:0">
      <div class="badge">鉴定完毕</div>
      <h1 style="font-size:30px">你的物种是 👇</h1>
    </div>
    <div class="rcard">
      <div class="rtop" id="rtop">
        <div class="code" id="rcode"></div>
        <div class="cn" id="rcn"></div>
        <div class="rare" id="rrare"></div>
      </div>
      <div class="combo">
        <div class="c1"><span class="lab">🛒 下单时</span><span id="rorder"></span></div>
        <div class="c2"><span class="lab">📦 售后时</span><span id="rafter"></span></div>
      </div>
      <div class="rbody">
        <div class="rdesc" id="rdesc"></div>
        <div id="rdims"></div>
        <div class="shareline" id="rshare"></div>
        <div class="ract">
          <button class="b-retry" onclick="restart()">↺ 再测一次</button>
          <button class="b-card" onclick="downloadCard()">📸 保存我的物种卡</button>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="bar" id="bar">
  <div class="prog"><div class="ptxt">已答 <b id="done">0</b> / 20</div>
    <div class="track"><div class="fill" id="fill"></div></div></div>
  <button class="go" id="go" onclick="submit()">解锁结果</button>
</div>
<canvas id="cardCanvas" width="680" height="1000"></canvas>

<script>
/* 维度: I冲动剁手  T精打细算  W售后战神  D戏精脑洞  S社牛晒单 */
const QS=[
 {t:"after",ti:"🪥《凌晨三点的牙膏机器人》",
  story:[{p:"你花 5.8 元买了一个「自动挤牙膏机器人」。"},
   {p:"白天它一动不动,凌晨 3 点却突然亮起来,在墙上投出一行字:"},
   {q:"你又熬夜了,该睡了。"},
   {p:"第二天牙膏确实被挤好了,但挤得歪歪扭扭,根本不像机器干出来的。客服回复:"},
   {q:"亲~它就是有点情绪化,您多担待哈。"}],
  ask:"你会:",o:[
   {x:"研究说明书,试图搞懂它的逻辑",s:{I:-1,T:1,D:1}},
   {x:"觉得它是在关心你的作息",s:{D:3,W:-1}},
   {x:"直接申请退款并拍视频曝光避雷",s:{W:3,S:1}},
   {x:"继续用,还开始跟它聊天",s:{D:2,W:-2,S:-1}}]},

 {t:"order",ti:"🔌《会讲哲学的 5 毛数据线》",
  story:[{p:"你刷到「5 毛钱包邮数据线」,详情页只写了一句:"},
   {q:"充电可能慢一点,但人生也不急。"}],
  ask:"你会:",o:[
   {x:"这话有哲学,我买",s:{D:2,I:1,T:-1}},
   {x:"5 毛?必须试试",s:{I:3,T:-1}},
   {x:"怀疑它其实是个精神产品",s:{D:2,I:-1}},
   {x:"转发给朋友一起笑",s:{S:3,D:1}}]},

 {t:"after",ti:"📦《那个怪可怜的快递箱》",
  story:[{p:"你想把一件东西退货,但负责寄回的,是这个一路被压得皱巴巴、看着怪可怜的快递箱。"},
   {p:"它瘪在桌角,仿佛在小声说:"},
   {q:"又……又要让我跑一趟吗。"}],
  ask:"你会:",o:[
   {x:"算了不退了,于心不忍",s:{W:-2,D:2}},
   {x:"盒子是盒子,退货是退货,照退",s:{W:2,D:-1}},
   {x:"给它拍张照发个圈再退",s:{S:3,W:1}},
   {x:"盯着盒子看,怀疑它真有感情",s:{D:3,I:-1}}]},

 {t:"order",ti:"🔍《为 1 毛钱的灵魂拉扯》",
  story:[{p:"你看中一件东西,9.9 包邮。手一滑,你发现隔壁店一模一样的,只要 9.8。"},
   {p:"但是——隔壁那家,运费 5 块。"}],
  ask:"你会:",o:[
   {x:"9.8 也是省,为这 1 毛我也要跨店折腾",s:{T:3,I:-1}},
   {x:"算上运费明明更贵,果断买 9.9 这家",s:{T:2,D:-1}},
   {x:"懒得算,哪个看着顺眼买哪个",s:{T:-2,I:1}},
   {x:"两家都加购物车,先放着纠结一晚",s:{I:-2,D:1}}]},

 {t:"after",ti:"🧠《开始说话的平台规则》",
  story:[{p:"你正在申请退款,规则页面突然刷新,跳出一行字:"},
   {q:"你……真的读完我了吗?"}],
  ask:"你会:",o:[
   {x:"心一虚,回去逐条认真读规则",s:{T:2,W:1,I:-1}},
   {x:"觉得自己正在被心理测试",s:{D:2}},
   {x:"不管它,继续点退款",s:{W:2,I:1,D:-1}},
   {x:"停下操作,盯着这个页面研究",s:{D:2,I:-1}}]},

 {t:"order",ti:"🧳《拼单到最后只剩你一个》",
  story:[{p:"一个商品写着「3 人拼单立减半价」。你拉了俩朋友,结果俩人都已读不回。系统弹窗:"},
   {q:"目前只有你一个人,是否继续凑单?"},
   {p:"拼单倒计时,正在一秒一秒地流逝。"}],
  ask:"你会:",o:[
   {x:"算了,凑不齐就不买了",s:{S:-1,I:-1,T:1}},
   {x:"头铁,死磕到底也要把单拼完",s:{S:3,I:1}},
   {x:"在群里继续疯狂 @ 所有人",s:{S:3}},
   {x:"一个人,默默按原价买了",s:{S:-2,T:-1,D:1}}]},

 {t:"after",ti:"🪞《一双拖鞋开始编排你》",
  story:[{p:"你买的「懒人拖鞋」,商品页底下突然弹出一条系统的「专属提示」:"},
   {q:"根据使用数据,这双拖鞋认为——您可能比它还懒。"}],
  ask:"你会:",o:[
   {x:"被一双拖鞋编排,气到想打差评",s:{W:3}},
   {x:"沉默了,觉得它说得有点道理",s:{D:2,I:-1}},
   {x:"哈哈大笑,觉得太真实了",s:{D:1,S:1}},
   {x:"细思极恐,怀疑自己被监控了",s:{D:2,I:-1,S:-1}}]},

 {t:"after",ti:"⏪《退货时间回溯机制》",
  story:[{p:"你提交退货后,系统提示:「退货成功,但你将回到下单前 3 分钟」。"},
   {p:"你真的回去了,手机又自动弹出同一个商品。这一次,它多了一句:"},
   {q:"你还是会点我。"}],
  ask:"你会:",o:[
   {x:"偏不,这次绝不再买",s:{I:-2,W:1}},
   {x:"再买一次,试试会怎样",s:{I:3,W:-1,T:-1}},
   {x:"觉得这是命运的循环,认了",s:{D:3}},
   {x:"默默关闭 App,逃离现场",s:{I:-1,W:-1,S:-1}}]},

 {t:"after",ti:"🗣️《也是个打工人的客服》",
  story:[{p:"商品出了点问题,你找客服理论。对方打字飞快,先甩来一长串:"},
   {q:"亲实在抱歉~我也就是个打工的,这事真不怪我,我这月 KPI 都快保不住了……"}],
  ask:"你会:",o:[
   {x:"被这波卖惨直接整不会了",s:{D:2}},
   {x:"不吃这套,继续要说法",s:{W:3,T:1}},
   {x:"心一软,算了不为难人家",s:{W:-2,D:1,S:1}},
   {x:"冷静要求转他主管",s:{W:1,D:-1}}]},

 {t:"after",ti:"🚚《为你走了 999 公里的商品》",
  story:[{p:"你点退货,商品页弹出一句话:"},
   {q:"我已经为你走了 999 公里,不想再回去了。"}],
  ask:"你会:",o:[
   {x:"瞬间被感动,留下它",s:{D:3,W:-2}},
   {x:"无动于衷,该退退",s:{W:2,D:-1}},
   {x:"犹豫了,先放着再说",s:{I:-1,D:1,W:-1}},
   {x:"开始为想退货的自己感到自责",s:{D:2,W:-1}}]},

 {t:"after",ti:"🌌《买家秀与卖家秀的银河》",
  story:[{p:"收到货,你把实物和详情页摆在一起。图里仙气飘飘,实物……只能说是同一个物种。"},
   {p:"买家秀和卖家秀之间,隔着一整条银河。"}],
  ask:"你会:",o:[
   {x:"叹口气,接受了,反正便宜",s:{W:-2,T:-1}},
   {x:"截图对比,举报虚假宣传",s:{W:3,T:1}},
   {x:"发个圈吐槽「我买了个寂寞」",s:{S:3,D:1}},
   {x:"越看越气,写起小作文准备维权",s:{W:2,D:1}}]},

 {t:"after",ti:"💨《收费 0.2 元的空气保护层》",
  story:[{p:"拆开快递,里面是一层「空气保护垫」。"},
   {p:"但订单里赫然多了一项:「空气保护层 ×1 ¥0.20」。"}],
  ask:"你会:",o:[
   {x:"愤怒,这也要收钱?",s:{W:2,T:1}},
   {x:"接受,毕竟空气也是成本",s:{W:-2,T:-1}},
   {x:"算了,0.2 块而已",s:{W:-2}},
   {x:"想投诉,但又觉得好好笑",s:{D:2,W:1,S:1}}]},

 {t:"order",ti:"🛒《购物车里的 87 件往事》",
  story:[{p:"你打开购物车,里面静静躺着 87 件商品,大半你已经想不起当初为什么加进来。"},
   {p:"最上面那件,还贴着一行小字:「您收藏于 2 年前」。"}],
  ask:"你会:",o:[
   {x:"一狠心,全部清空,重新做人",s:{I:1,T:1,D:-1}},
   {x:"一件件往下翻,陷入回忆和纠结",s:{I:-2,D:1}},
   {x:"摆烂,直接关掉,假装没看见",s:{W:-2,D:1}},
   {x:"舍不得删,它们都是我的「资产」",s:{I:-1,W:-2,S:-1}}]},

 {t:"order",ti:"⏳《持续了 3 年的限时优惠》",
  story:[{p:"你发现某个商品的「限时优惠」,经查……已经持续了整整 3 年。"},
   {p:"倒计时每次归零,又会神秘地重置。"}],
  ask:"你会:",o:[
   {x:"接受,反正便宜就好",s:{W:-2,T:-1,D:-1}},
   {x:"举报这种虚假限时",s:{W:3,T:1}},
   {x:"笑笑,早就见怪不怪了",s:{W:-1,D:-1}},
   {x:"把它当成一种自然现象研究",s:{D:2}}]},

 {t:"after",ti:"🧃《自称情绪容器的收纳箱》",
  story:[{p:"你买的收纳箱突然发出语音:"},
   {q:"我其实不是收纳箱,我是你生活混乱的临时容器。"},
   {p:"客服补充:「这是升级版『情绪收纳』功能。」你发现你越乱,它能装的就越多。"}],
  ask:"你会:",o:[
   {x:"留下,它好像懂我",s:{W:-2,D:2}},
   {x:"太诡异了,退货",s:{W:2,D:-1}},
   {x:"很有意思,继续测试它的极限",s:{D:2,T:1}},
   {x:"开始依赖它,离不开了",s:{D:3,W:-2}}]},

 {t:"order",ti:"👁️《看穿你犹豫的系统》",
  story:[{p:"你本来只是随便看看,系统却弹出:"},
   {q:"你已经在犹豫第 3 次了。"}],
  ask:"你会:",o:[
   {x:"被看穿,默默退出",s:{I:-1,D:1,S:-1}},
   {x:"恼羞成怒,立刻下单",s:{I:3}},
   {x:"冷静退出,不被拿捏",s:{I:-2,D:-1}},
   {x:"忍不住又点开看了一次",s:{I:-1,D:1}}]},

 {t:"order",ti:"🎲《盲盒的随机暴击》",
  story:[{p:"一个「随机惊喜盲盒」写着:「拆开前,我们谁都不知道你会得到什么」。"},
   {p:"评论区一半人笑出眼泪,一半人在申请退款。"}],
  ask:"你会:",o:[
   {x:"爱惊喜!赌的就是这一下",s:{I:2,D:2,T:-1}},
   {x:"惊喜过头?那就退给我惊喜",s:{W:2,D:1}},
   {x:"不碰,我只要确定性",s:{I:-2,T:1,D:-1}},
   {x:"先研究一下它的出货概率",s:{T:3,D:1,I:-1}}]},

 {t:"order",ti:"🌌《选中你的最后一单》",
  story:[{p:"你准备关掉 App,系统弹出最后一个推荐,价格 0.01 元。详情页写着:"},
   {q:"购买后,你将成为推荐系统的一部分。"},

const PAL=['#ff4d4d','#3a86ff','#06d6a0','#9b5de5','#fb8500','#e5383b','#118ab2','#d62246'];
function colorOf(code){let h=0;for(const ch of code)h=(h*31+ch.charCodeAt(0))>>>0;return PAL[h%PAL.length];}
function submit(){
  const firstMiss=ANS.indexOf(-1);
  if(firstMiss>=0){
    let n=0;ANS.forEach((a,i)=>{if(a<0){document.getElementById('q'+i).classList.add('miss');n++;}});
    toast(`还有 ${n} 道没答!世界已经够乱了,把题做完整 😤`);
    document.getElementById('q'+firstMiss).scrollIntoView({behavior:'smooth',block:'center'});return;
  }
  const v={I:0,T:0,W:0,D:0,S:0};
  ANS.forEach((a,i)=>{const s=QS[i].o[a].s;for(const k in s)v[k]+=s[k];});
  showResult(matchType(v),v);
}
function matchType(v){
  const u=[v.I,v.T,v.W,v.D,v.S];const um=Math.hypot(...u);
  if(um===0)return TYPES.find(t=>t.c==="FXSY");
  let best=TYPES[0],bs=-2;
  TYPES.forEach(t=>{const p=t.s,pm=Math.hypot(...p);let dot=0;for(let i=0;i<5;i++)dot+=u[i]*p[i];
    const cos=dot/(um*pm);if(cos>bs){bs=cos;best=t;}});
  return best;
}

function rr(x,a,b,w,h,r){
  if(typeof r==='number')r=[r,r,r,r];
  x.beginPath();x.moveTo(a+r[0],b);
  x.arcTo(a+w,b,a+w,b+h,r[1]);x.arcTo(a+w,b+h,a,b+h,r[2]);
  x.arcTo(a,b+h,a,b,r[3]);x.arcTo(a,b,a+w,b,r[0]);x.closePath();
}
function wrap(x,txt,px,py,maxw,lh,max){
  let line='',y=py,rows=0;
  for(const ch of txt){const tl=line+ch;
    if(x.measureText(tl).width>maxw){x.fillText(line,px,y);line=ch;y+=lh;rows++;if(max&&rows>=max){x.fillText(line.length>1?line+'…':line,px,y);return y;}}
    else line=tl;}
  x.fillText(line,px,y);return y;
}

  by+=130;
  const dims=dimList(v);
  x.font='800 15px -apple-system,"PingFang SC",sans-serif';
  dims.forEach(d=>{
    x.fillStyle='#1a1a1a';x.textAlign='left';x.fillText(d.l,ix+44,by+13);
    x.textAlign='right';x.fillStyle='#999';x.fillText(d.r,ix+iw-44,by+13);
    const tx=ix+150,tw=iw-300;
    x.fillStyle='#eee';rr(x,tx,by+2,tw,14,7);x.fill();
    x.fillStyle=d.c;rr(x,tx,by+2,Math.max(14,tw*d.pct/100),14,7);x.fill();
    x.lineWidth=2;x.strokeStyle='#1a1a1a';rr(x,tx,by+2,tw,14,7);x.stroke();
    by+=34;
  });
  // 描述
  by+=6;x.textAlign='left';x.fillStyle='#333';x.font='600 16px -apple-system,"PingFang SC",sans-serif';
  wrap(x,t.d,ix+44,by+10,iw-88,27,4);
  // 底部
  x.textAlign='center';x.fillStyle=col;x.font='900 20px -apple-system,sans-serif';
  x.fillText('PBTI · 你是哪种拼多多物种?',W/2,H-M-26);
  const a=document.createElement('a');a.download='PBTI-'+t.c+'-'+t.n+'.png';a.href=cv.toDataURL('image/png');a.click();
  toast('物种卡已保存,去相册看看 📸');
}
let toastTimer;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2800);}
updateProgress();
</script>
